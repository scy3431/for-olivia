<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Keepsake &mdash; A Vinyl &amp; Photograph Scrapbook</title>
<meta name="description" content="An interactive scrapbook: a record player and a photograph collection, kept together." />

<link rel="icon" type="image/png" href="assets/icons/favicon.png" />
<link rel="icon" href="assets/icons/favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="assets/icons/favicon.png" />

<!-- Google Fonts: Cormorant Garamond (display serif) + Jost (clean sans) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="grain-overlay" aria-hidden="true"></div>

<!-- Home screen -->
<main id="home-screen" class="screen screen--home is-active" aria-label="Home">

  <div class="home-backdrop" id="home-backdrop"></div>

  <div class="home-objects">

    <!-- Icon 1: Vinyl record -->
    <button class="object-trigger object-trigger--vinyl" id="open-player" aria-label="Open the record player">
      <span class="tabletop-shadow" aria-hidden="false"></span>
      <span class="mini-vinyl" aria-hidden="true">
        <span class="mini-vinyl__grooves"></span>
        <span class="mini-vinyl__label">
          <img id="mini-vinyl-art" src="assets/images/album.jpg" alt="" onerror="this.style.display='none'" />
        </span>
        <span class="mini-vinyl__sheen"></span>
      </span>
      <span class="object-caption">the record player</span>
    </button>

    <!-- Icon 2: Camera -->
    <button class="object-trigger object-trigger--camera" id="open-gallery" aria-label="Open the photograph gallery">
      <span class="tabletop-shadow" aria-hidden="true"></span>
      <span class="mini-camera" aria-hidden="true">
        <span class="mini-camera__flash-burst"></span>
        <span class="mini-camera__body">
          <span class="mini-camera__viewfinder"></span>
          <span class="mini-camera__lens">
            <span class="mini-camera__lens-glass"></span>
          </span>
          <span class="mini-camera__button"></span>
        </span>
      </span>
      <span class="object-caption">the photographs</span>
    </button>

    <!-- Icon 3: Notepad / journal -->
    <button class="object-trigger object-trigger--notepad" id="open-journal" aria-label="Open the journal">
      <span class="tabletop-shadow" aria-hidden="true"></span>
      <span class="mini-notepad" aria-hidden="true">
        <span class="mini-notepad__spiral"></span>
        <span class="mini-notepad__page">
          <span class="mini-notepad__line"></span>
          <span class="mini-notepad__line"></span>
          <span class="mini-notepad__line"></span>
          <span class="mini-notepad__pen"></span>
        </span>
      </span>
      <span class="object-caption">the journal</span>
    </button>

  </div>
</main>

<!-- Record player screen -->
<section id="player-screen" class="screen screen--player" aria-label="Record player">

  <div class="screen-nav">
    <button class="back-button" data-back aria-label="Back to home">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M15 4L7 12L15 20" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>back</span>
    </button>
    <button class="back-button back-button--music" data-back-keep-music aria-label="Back to home, keep the music playing">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M9 18V6l10-2v12" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="18" r="2.5" stroke="currentColor" stroke-width="1.6" fill="none"/><circle cx="16.5" cy="16" r="2.5" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
      <span>back (with music)</span>
    </button>
  </div>

  <div class="player-layout">

    <!-- Turntable design -->
    <div class="turntable-wrap">
      <div class="turntable">
        <div class="turntable__plinth-shine" aria-hidden="true"></div>

        <div class="platter">
          <div class="vinyl-record" id="vinyl-record">
            <div class="vinyl-record__grooves"></div>
            <div class="vinyl-record__label">
              <img id="player-vinyl-art" src="assets/images/album.jpg" alt="Album artwork" onerror="this.style.display='none'" />
            </div>
            <div class="vinyl-record__sheen" aria-hidden="true"></div>
          </div>
          <div class="spindle" aria-hidden="true"></div>
        </div>

        <div class="tonearm" id="tonearm">
          <div class="tonearm__base"></div>
          <div class="tonearm__pivot">
            <div class="tonearm__wand">
              <div class="tonearm__head"></div>
            </div>
          </div>
        </div>

        <div class="tonearm-rest" aria-hidden="true"></div>
      </div>

      <p class="now-playing" id="now-playing">Choose a song to begin</p>
    </div>

    <aside class="liner-notes">
      <div class="liner-notes__header">
        <h2 class="liner-notes__title" id="side-label">Side&nbsp;A</h2>
        <button class="flip-button" id="flip-side" aria-label="Flip the record to the other side" title="Flip record">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M4 12a8 8 0 0 1 13.2-6.1M20 12a8 8 0 0 1-13.2 6.1" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round"/>
            <path d="M17.4 4.4v3.6H13.8M6.6 19.6v-3.6h3.6" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>flip</span>
        </button>
      </div>
      <ol class="playlist" id="playlist"><!-- populated by script.js --></ol>
    </aside>
  </div>

  <!-- previous, play/pause, next -->
  <div class="controls-bar">
    <div class="controls-bar__buttons">
      <button class="ctrl-btn ctrl-btn--prev" id="btn-prev" aria-label="Previous song" title="Previous">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M18 5L9 12l9 7V5z" fill="currentColor"/><rect x="5" y="5" width="2" height="14" fill="currentColor"/></svg>
      </button>
      <button class="ctrl-btn ctrl-btn--play" id="btn-play" aria-label="Play" title="Play / Pause">
        <svg id="icon-play" viewBox="0 0 24 24" width="20" height="20"><path d="M7 4l14 8-14 8V4z" fill="currentColor"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" width="20" height="20" style="display:none"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>
      </button>
      <button class="ctrl-btn ctrl-btn--next" id="btn-next" aria-label="Next song" title="Next">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 5l9 7-9 7V5z" fill="currentColor"/><rect x="17" y="5" width="2" height="14" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <!-- hidden YouTube player target -->
  <div id="youtube-player" class="youtube-target" aria-hidden="true"></div>
</section>

<!-- gallery screen -->
<section id="gallery-screen" class="screen screen--gallery" aria-label="Photograph gallery">
  <div class="screen-nav">
    <button class="back-button back-button--dark" data-back aria-label="Back to home">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M15 4L7 12L15 20" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>back</span>
    </button>
  </div>

  <h2 class="gallery-title">Photographs</h2>

  <div class="gallery-grid" id="gallery-grid"><!-- populated by script.js: a plain grid of all 13 photos, no fullscreen viewer --></div>

  <!-- hidden letter easter egg: a small folded note tucked in the corner -->
  <button class="hidden-letter" id="hidden-letter" aria-label="A folded note">
    <svg viewBox="0 0 40 40" width="34" height="34" aria-hidden="true">
      <path d="M3 8h34v24H3z" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <path d="M3 8l17 13L37 8" fill="none" stroke="currentColor" stroke-width="1.4"/>
    </svg>
  </button>
</section>

<!-- journal screen -->
<section id="journal-screen" class="screen screen--journal" aria-label="Journal">
  <div class="screen-nav">
    <button class="back-button back-button--dark" data-back aria-label="Back to home">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M15 4L7 12L15 20" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>back</span>
    </button>
  </div>

  <h2 class="gallery-title">Journal</h2>

  <!-- password gate -->
  <div class="journal-lock" id="journal-lock">
    <p class="journal-lock__prompt">This little notebook is just for us.</p>
    <form id="journal-lock-form" class="journal-lock__form">
      <input type="password" id="journal-password-input" class="journal-lock__input" placeholder="passphrase" autocomplete="off" />
      <button type="submit" class="journal-lock__submit">unlock</button>
    </form>
    <p class="journal-lock__error" id="journal-lock-error" hidden>that's not quite it &mdash; try again</p>
  </div>

  <!-- unlocked journal contents -->
  <div class="journal-content" id="journal-content" hidden>

    <button class="journal-add-button" id="journal-add-button" aria-label="Write a new entry">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <div class="journal-entries" id="journal-entries"><!-- populated by script.js --></div>
  </div>

  <!-- composer for a brand-new entry -->
  <div class="journal-composer" id="journal-composer" hidden>
    <div class="journal-composer__card">
      <label class="journal-composer__date" for="journal-composer-date">Date</label>
      <input type="date" id="journal-composer-date" class="journal-composer__date-input" />

      <label class="journal-composer__label" for="journal-composer-text">Today, I wanted to tell you&hellip;</label>
      <textarea id="journal-composer-text" class="journal-composer__text" rows="8"></textarea>

      <div class="journal-composer__actions">
        <button type="button" class="journal-composer__cancel" id="journal-composer-cancel">cancel</button>
        <button type="button" class="journal-composer__save" id="journal-composer-save">save entry</button>
      </div>
    </div>
  </div>

  <!-- brief confirmation toast after saving, no code shown -->
  <div class="journal-toast" id="journal-toast" hidden></div>

</section>

<!-- journal entry viewer (opened from a calendar day) -->
<div id="journal-entry-view" class="letter-overlay" hidden>
  <button class="letter-overlay__close" id="journal-entry-view-close" aria-label="Close entry">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <div class="letter-overlay__paper">
    <p class="journal-entry-view__date" id="journal-entry-view-date"></p>
    <p class="letter-overlay__text" id="journal-entry-view-text"></p>
  </div>
</div>

<!-- photo enlarge overlay -->
<div id="photo-enlarge" class="photo-enlarge" hidden>
  <button class="photo-enlarge__close" id="photo-enlarge-close" aria-label="Close">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <figure class="photo-enlarge__stage">
    <img id="photo-enlarge-img" src="" alt="" />
    <figcaption id="photo-enlarge-caption"></figcaption>
  </figure>
</div>

<!-- expanded letter overlay -->
<div id="letter-overlay" class="letter-overlay" hidden>
  <button class="letter-overlay__close" id="letter-overlay-close" aria-label="Close letter">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <div class="letter-overlay__paper" id="letter-overlay-paper">
    <p id="letter-overlay-text" class="letter-overlay__text"><!-- populated by script.js from CONFIG.hiddenLetterText --></p>
  </div>
</div>

<!-- youtube iframe api -->
<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>
</body>
</html>
