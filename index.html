<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Keepsake &mdash; A Vinyl &amp; Photograph Scrapbook</title>
<meta name="description" content="An interactive scrapbook: a record player and a photograph collection, kept together." />

<!-- Google Fonts: Cormorant Garamond (display serif) + Jost (clean sans) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Grain / vignette overlay sits above everything, purely decorative -->
<div class="grain-overlay" aria-hidden="true"></div>

<!-- ======================================================
     HOME SCREEN
====================================================== -->
<main id="home-screen" class="screen screen--home is-active" aria-label="Home">

  <div class="home-backdrop" id="home-backdrop"></div>

  <header class="home-header">
    <p class="home-eyebrow">a little archive of ours</p>
    <h1 class="home-title" id="site-title">Keepsake</h1>
    <p class="home-subtitle">Press a memory to open it.</p>
  </header>

  <div class="home-objects">

    <!-- ICON 1: Vinyl record -->
    <button class="object-trigger object-trigger--vinyl" id="open-player" aria-label="Open the record player">
      <span class="tabletop-shadow" aria-hidden="true"></span>
      <span class="mini-vinyl" aria-hidden="true">
        <span class="mini-vinyl__grooves"></span>
        <span class="mini-vinyl__label">
          <img id="mini-vinyl-art" src="assets/images/album.jpg" alt="" onerror="this.style.display='none'" />
        </span>
        <span class="mini-vinyl__sheen"></span>
      </span>
      <span class="object-caption">the record player</span>
    </button>

    <!-- ICON 2: Camera -->
    <button class="object-trigger object-trigger--camera" id="open-gallery" aria-label="Open the photograph gallery">
      <span class="tabletop-shadow" aria-hidden="true"></span>
      <span class="mini-camera" aria-hidden="true">
        <span class="mini-camera__flash-burst"></span>
        <span class="mini-camera__body">
          <span class="mini-camera__viewfinder"></span>
          <span class="mini-camera__lens">
            <span class="mini-camera__lens-glass"></span>
          </span>
          <span class="mini-camera__button"></span>
        </span>
      </span>
      <span class="object-caption">the photographs</span>
    </button>

  </div>

  <p class="home-footnote">thirteen songs &middot; thirteen photographs</p>
</main>

<!-- ======================================================
     RECORD PLAYER SCREEN
====================================================== -->
<section id="player-screen" class="screen screen--player" aria-label="Record player" hidden>

  <button class="back-button" data-back aria-label="Back to home">
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M15 4L7 12L15 20" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>back</span>
  </button>

  <div class="player-layout">

    <!-- The physical turntable -->
    <div class="turntable-wrap">
      <div class="turntable">
        <div class="turntable__plinth-shine" aria-hidden="true"></div>

        <div class="platter">
          <div class="vinyl-record" id="vinyl-record">
            <div class="vinyl-record__grooves"></div>
            <div class="vinyl-record__label">
              <img id="player-vinyl-art" src="assets/images/album.jpg" alt="Album artwork" onerror="this.style.display='none'" />
            </div>
            <div class="vinyl-record__sheen" aria-hidden="true"></div>
          </div>
          <div class="spindle" aria-hidden="true"></div>
        </div>

        <div class="tonearm" id="tonearm">
          <div class="tonearm__base"></div>
          <div class="tonearm__pivot">
            <div class="tonearm__wand">
              <div class="tonearm__head"></div>
            </div>
          </div>
        </div>
      </div>

      <p class="now-playing" id="now-playing">Choose a song to begin</p>
    </div>

    <!-- Liner-notes style playlist -->
    <aside class="liner-notes">
      <h2 class="liner-notes__title">Side&nbsp;A</h2>
      <ol class="playlist" id="playlist"><!-- populated by script.js --></ol>
    </aside>
  </div>

  <!-- Transport controls -->
  <div class="controls-bar">
    <div class="controls-bar__progress">
      <span class="controls-bar__time" id="time-current">0:00</span>
      <input type="range" id="seek" class="seek-slider" min="0" max="1000" value="0" step="1" aria-label="Seek">
      <span class="controls-bar__time" id="time-duration">0:00</span>
    </div>

    <div class="controls-bar__buttons">
      <button class="ctrl-btn ctrl-btn--shuffle" id="btn-shuffle" aria-label="Shuffle" aria-pressed="false" title="Shuffle">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 6h3.5l7 12H18M4 18h3.5l2.2-3.8M14.8 6H18" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.5 3.5L18.5 6L15.5 8.5M15.5 15.5L18.5 18L15.5 20.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="ctrl-btn ctrl-btn--prev" id="btn-prev" aria-label="Previous song" title="Previous">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M18 5L9 12l9 7V5z" fill="currentColor"/><rect x="5" y="5" width="2" height="14" fill="currentColor"/></svg>
      </button>
      <button class="ctrl-btn ctrl-btn--play" id="btn-play" aria-label="Play" title="Play / Pause">
        <svg id="icon-play" viewBox="0 0 24 24" width="20" height="20"><path d="M7 4l14 8-14 8V4z" fill="currentColor"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" width="20" height="20" style="display:none"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>
      </button>
      <button class="ctrl-btn ctrl-btn--next" id="btn-next" aria-label="Next song" title="Next">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 5l9 7-9 7V5z" fill="currentColor"/><rect x="17" y="5" width="2" height="14" fill="currentColor"/></svg>
      </button>
      <button class="ctrl-btn ctrl-btn--repeat" id="btn-repeat" aria-label="Repeat" aria-pressed="false" title="Repeat">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 8h13a3 3 0 013 3v1M20 16H7a3 3 0 01-3-3v-1" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/><path d="M8 5L4 8l4 3M16 19l4-3-4-3" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="controls-bar__volume">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path d="M17 8.5a5 5 0 010 7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      <input type="range" id="volume" class="volume-slider" min="0" max="100" value="70" aria-label="Volume">
    </div>
  </div>

  <!-- Hidden YouTube player target -->
  <div id="youtube-player" class="youtube-target" aria-hidden="true"></div>
</section>

<!-- ======================================================
     GALLERY SCREEN
====================================================== -->
<section id="gallery-screen" class="screen screen--gallery" aria-label="Photograph gallery" hidden>
  <button class="back-button back-button--dark" data-back aria-label="Back to home">
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M15 4L7 12L15 20" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>back</span>
  </button>

  <h2 class="gallery-title">Photographs</h2>

  <div class="gallery-grid" id="gallery-grid"><!-- populated by script.js --></div>
</section>

<!-- ======================================================
     LIGHTBOX
====================================================== -->
<div id="lightbox" class="lightbox" hidden>
  <button class="lightbox__close" id="lightbox-close" aria-label="Close">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <button class="lightbox__nav lightbox__nav--prev" id="lightbox-prev" aria-label="Previous photo">
    <svg viewBox="0 0 24 24" width="26" height="26"><path d="M15 4L7 12L15 20" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <figure class="lightbox__stage">
    <img id="lightbox-img" src="" alt="" />
    <figcaption id="lightbox-caption"></figcaption>
  </figure>
  <button class="lightbox__nav lightbox__nav--next" id="lightbox-next" aria-label="Next photo">
    <svg viewBox="0 0 24 24" width="26" height="26"><path d="M9 4l8 8-8 8" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>
</body>
</html>
